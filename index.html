<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Assistant</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section class="flex-container">
      <div class="page-wrapper">
        <!------- Header / Branding ------->
        <header class="site-header">
          <img src="img/loreal-logo.png" alt="L'Oréal Logo" />
          <h1 class="site-title">Beauty Product Advisor</h1>
        </header>

        <!------- Chat Area ------->
        <main>
          <section class="chatbox">
            <div id="chatWindow" class="chat-window">
              <!-- messages will be appended here via JS -->
            </div>

            <form id="chatForm" class="chat-form">
              <label for="userInput" class="visually-hidden">Message</label>
              <input
                id="userInput"
                name="userInput"
                type="text"
                placeholder="Ask me about products or routines…"
                autocomplete="off"
                required
              />
              <button type="submit" id="sendBtn">
                <span class="material-icons">send</span>
                <span class="visually-hidden">Send</span>
              </button>
            </form>
          </section>
        </main>
      </div>
    </section>
    <!------- Footer Links ------->
    <footer class="site-footer">
      <p>&copy; 2026 L'Oréal. All rights reserved.</p>
      <nav>
        <!-- These URLs are placeholders -->
        <a href="https://www.loreal.com/en/">Website</a>
        <a href="https://www.loreal.com/en/group/">About Us</a>
        <a href="https://www.loreal.com/en/our-global-brands-portfolio/"
          >Brands</a
        >
        <a href="https://www.loreal.com/en/term-of-use/">Terms of Use</a>
        <a href="https://www.loreal.com/en/group/global-privacy-policy/"
          >Privacy Policy</a
        >
      </nav>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
